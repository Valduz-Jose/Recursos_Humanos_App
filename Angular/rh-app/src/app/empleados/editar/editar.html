<div class="container mt-4">
    <h2>Editar empleado</h2>

    @if (cargando) {
    <div class="alert alert-info mt-3">Cargando...</div>
    }

    @if (error && !cargando) {
    <div class="alert alert-danger mt-3">{{ error }}</div>
    }

    @if (!cargando && !error) {
    <form (ngSubmit)="onSubmit()" #f="ngForm" class="mt-3">
        <div class="mb-3">
            <label class="form-label">ID</label>
            <input class="form-control" type="text" [value]="empleado.idEmpleado" disabled />
            <div class="form-text">El ID no se puede modificar.</div>
        </div>

        <div class="mb-3">
            <label class="form-label">Nombre</label>
            <input type="text" class="form-control" name="nombre" [(ngModel)]="empleado.nombre" required minlength="2"
                placeholder="Nombre completo" />
        </div>

        <div class="mb-3">
            <label class="form-label">Departamento</label>
            <input type="text" class="form-control" name="departamento" [(ngModel)]="empleado.departamento" required
                placeholder="Ej. Ventas, TI, RH" />
        </div>

        <div class="mb-3">
            <label class="form-label">Sueldo</label>
            <input type="number" class="form-control" name="sueldo" [(ngModel)]="empleado.sueldo" required min="0"
                step="0.01" placeholder="0.00" />
        </div>

        <div class="d-flex gap-2">
            <button class="btn btn-primary" type="submit" [disabled]="f.invalid || guardando">
                {{ guardando ? 'Guardando...' : 'Guardar cambios' }}
            </button>
            <a class="btn btn-outline-secondary" [routerLink]="['/empleados']">Cancelar</a>
        </div>
    </form>
    }

</div>
